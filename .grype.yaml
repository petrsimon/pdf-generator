ignore:
  # Go stdlib and module vulnerabilities from binaries in the UBI9 base image
  # and Konflux pipeline tools (cosign, syft). Not part of the application —
  # fixed when Red Hat updates the base images.
  - package:
      type: go-module
      name: stdlib
  - package:
      type: go-module
      name: golang.org/x/crypto
  - package:
      type: go-module
      name: golang.org/x/net
  - package:
      type: go-module
      name: golang.org/x/sys

  # sigstore ships inside npm (used for package signing), which lives in the
  # builder stage only — never reaches the runtime image. Fixed when the UBI9
  # nodejs-22 base image updates its bundled npm.
  - package:
      type: npm
      name: sigstore
  - package:
      type: npm
      name: "@sigstore/core"

  # uuid 8.3.2 is pinned by @openshift/dynamic-plugin-sdk ^8.3.2.
  # The vuln (weak randomness in v1) has no practical impact — this service
  # uses v4 (crypto-random) server-side.
  - package:
      type: npm
      name: uuid
      version: 8.3.2
